<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Leitor de Patrimônio</title>
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
  <header>
    <h1>Leitor de Patrimônio</h1>
  </header>

  <main>
    <section class="scanner-section">
      <div class="video-wrapper">
        <video id="preview" muted playsinline></video>
        <div class="scan-frame"></div>
      </div>
      <canvas id="captureCanvas" class="hidden"></canvas>
      <div class="scanner-controls">
        <button id="btnStart" type="button">Ligar câmera</button>
        <button id="btnCapture" type="button" disabled>Capturar e ler número</button>
        <button id="btnStop" type="button" disabled>Desligar câmera</button>
      </div>
      <p id="scanStatus" class="status"></p>

      <div id="reviewPanel" class="review-panel hidden">
        <h3>Confira o número lido</h3>
        <p class="hint">Confirme ou corrija o número antes de adicionar à lista.</p>
        <input type="text" id="reviewInput" autocomplete="off">
        <div class="review-actions">
          <button id="btnReviewAdd" type="button" class="primary">Adicionar à lista</button>
          <button id="btnReviewDiscard" type="button" class="secondary">Descartar</button>
        </div>
      </div>
    </section>

    <section class="manual-section">
      <h2>Adicionar manualmente</h2>
      <form id="manualForm">
        <input type="text" id="manualInput" placeholder="Número do patrimônio: 8 dígitos + dígito verificador (ex: 00132136-4)" autocomplete="off">
        <button type="submit">Adicionar</button>
      </form>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2>Patrimônios lidos (<span id="listCount">0</span>)</h2>
        <div class="list-actions">
          <button id="btnClear" type="button" class="secondary">Limpar lista</button>
          <button id="btnPdf" type="button" class="primary">Salvar PDF</button>
        </div>
      </div>
      <table id="resultTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Patrimônio</th>
            <th>Origem</th>
            <th>Horário</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
      <p id="emptyMessage" class="empty">Nenhum patrimônio lido ainda.</p>
    </section>
  </main>

  <script src="https://unpkg.com/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
  <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
